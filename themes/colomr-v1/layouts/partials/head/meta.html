<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta name="keywords" content="{{ .Site.Params.keywords }}" />
<meta name="author" content="{{ .Site.Params.author }}" />
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<link rel="icon" type="image/png" sizes="32x32" href="{{ .Site.Params.favicon_32 | default "/images/favicon-32x32.png" }}" />
<link rel="icon" type="image/png" sizes="16x16" href="{{ .Site.Params.favicon_16 | default "/images/favicon-16x16.png" }}" />
<link rel="manifest" href="/site.webmanifest" />
