<header class="site-header">
  <nav class="site-nav">
    <div class="nav-brand">
      <span class="material-symbols-outlined nav-icon">home</span>
      <a href="{{ "/" | relURL }}" class="nav-name">{{ .Site.Params.author }}</a>
    </div>
    <div class="nav-links">
      <a href="{{ "/quien/" | relURL }}" class="nav-link{{ if eq .RelPermalink "/quien/" }} nav-link--active{{ end }}">Quién</a>
      <a href="{{ "/que/" | relURL }}" class="nav-link{{ if eq .RelPermalink "/que/" }} nav-link--active{{ end }}">Qué</a>
      <a href="{{ "/donde/" | relURL }}" class="nav-link{{ if eq .RelPermalink "/donde/" }} nav-link--active{{ end }}">Dónde</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar modo de color" onclick="window.__toggleTheme()">
        <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
      </button>
      <div class="nav-avatar">
        <img src="{{ .Site.Params.avatarurl | default "/images/avatar.png" }}" alt="{{ .Site.Params.author }}" />
      </div>
    </div>
  </nav>
</header>

<!-- Bottom nav (solo móvil) -->
<nav class="bottom-nav" aria-label="Navegación principal">
  <a href="{{ "/" | relURL }}" class="bottom-nav__item{{ if .IsHome }} bottom-nav__item--active{{ end }}">
    <span class="material-symbols-outlined">home</span>
    <span>Home</span>
  </a>
  <a href="{{ "/que/" | relURL }}" class="bottom-nav__item{{ if eq .RelPermalink "/que/" }} bottom-nav__item--active{{ end }}">
    <span class="material-symbols-outlined">school</span>
    <span>Qué</span>
  </a>
  <a href="{{ "/quien/" | relURL }}" class="bottom-nav__item{{ if eq .RelPermalink "/quien/" }} bottom-nav__item--active{{ end }}">
    <span class="material-symbols-outlined">person</span>
    <span>Quién</span>
  </a>
  <a href="{{ "/donde/" | relURL }}" class="bottom-nav__item{{ if eq .RelPermalink "/donde/" }} bottom-nav__item--active{{ end }}">
    <span class="material-symbols-outlined">location_on</span>
    <span>Dónde</span>
  </a>
</nav>
