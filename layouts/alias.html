<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>colomr.cc</title>
  <link rel="canonical" href="{{ .Permalink }}">
  <script>
    (function() {
      var STORAGE_KEY = 'colomr-lang';
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved && (saved === 'es' || saved === 'en')) {
        window.location.replace('/' + saved + '/');
        return;
      }
      var langs = navigator.languages || [navigator.language || 'es'];
      var preferred = 'es';
      for (var i = 0; i < langs.length; i++) {
        var l = langs[i].toLowerCase();
        if (l.startsWith('en')) { preferred = 'en'; break; }
        if (l.startsWith('es')) { preferred = 'es'; break; }
      }
      window.location.replace('/' + preferred + '/');
    })();
  </script>
  <meta http-equiv="refresh" content="0; url={{ .Permalink }}">
</head>
<body></body>
</html>
