<header class="site-header">
  <nav class="site-nav">
    <div class="nav-brand">
      <a href="{{ "/" | relURL }}" class="nav-logo-link">
        <img src="/images/logo.png" alt="{{ .Site.Params.author }}" class="nav-logo" />
      </a>
    </div>
    <div class="nav-links">
      <a href="{{ "/sobre-mi/" | relURL }}" class="nav-link{{ if eq .RelPermalink "/sobre-mi/" }} nav-link--active{{ end }}">Quién</a>
      <a href="{{ "/formacion/" | relURL }}" class="nav-link{{ if eq .RelPermalink "/formacion/" }} nav-link--active{{ end }}">Qué</a>
      <a href="{{ "/vision/" | relURL }}" class="nav-link{{ if eq .RelPermalink "/vision/" }} nav-link--active{{ end }}">Dónde</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar modo de color" onclick="window.__toggleTheme()">
        <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
      </button>
      <div class="nav-avatar">
        <img src="{{ .Site.Params.avatarurl | default "/images/avatar.png" }}" alt="{{ .Site.Params.author }}" />
      </div>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Abrir menú" aria-expanded="false">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </nav>
</header>

<!-- Drawer móvil -->
<div class="nav-drawer" id="nav-drawer" aria-hidden="true">
  <a href="{{ "/" | relURL }}" class="nav-drawer__link{{ if .IsHome }} nav-drawer__link--active{{ end }}">
    <span class="material-symbols-outlined">home</span> Home
  </a>
  <a href="{{ "/sobre-mi/" | relURL }}" class="nav-drawer__link{{ if eq .RelPermalink "/sobre-mi/" }} nav-drawer__link--active{{ end }}">
    <span class="material-symbols-outlined">person</span> Quién
  </a>
  <a href="{{ "/formacion/" | relURL }}" class="nav-drawer__link{{ if eq .RelPermalink "/formacion/" }} nav-drawer__link--active{{ end }}">
    <span class="material-symbols-outlined">school</span> Qué
  </a>
  <a href="{{ "/vision/" | relURL }}" class="nav-drawer__link{{ if eq .RelPermalink "/vision/" }} nav-drawer__link--active{{ end }}">
    <span class="material-symbols-outlined">location_on</span> Dónde
  </a>
</div>
<div class="nav-overlay" id="nav-overlay"></div>

<!-- Bottom nav (solo móvil) -->
<nav class="bottom-nav" aria-label="Navegación principal">
  <a href="{{ "/" | relURL }}" class="bottom-nav__item{{ if .IsHome }} bottom-nav__item--active{{ end }}">
    <span class="material-symbols-outlined">home</span>
    <span>Home</span>
  </a>
  <a href="{{ "/formacion/" | relURL }}" class="bottom-nav__item{{ if eq .RelPermalink "/formacion/" }} bottom-nav__item--active{{ end }}">
    <span class="material-symbols-outlined">school</span>
    <span>Qué</span>
  </a>
  <a href="{{ "/sobre-mi/" | relURL }}" class="bottom-nav__item{{ if eq .RelPermalink "/sobre-mi/" }} bottom-nav__item--active{{ end }}">
    <span class="material-symbols-outlined">person</span>
    <span>Quién</span>
  </a>
  <a href="{{ "/vision/" | relURL }}" class="bottom-nav__item{{ if eq .RelPermalink "/vision/" }} bottom-nav__item--active{{ end }}">
    <span class="material-symbols-outlined">location_on</span>
    <span>Dónde</span>
  </a>
</nav>
